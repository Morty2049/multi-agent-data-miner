<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tally</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="tally-font-display">
  <header>
    <span class="brand">Tally</span>
    <span id="api-dot" class="api-dot" data-state="unknown" title="API status"></span>
  </header>

  <p class="hint">
    Tally lives inside LinkedIn as a sidebar. Open a jobs page to use it.
  </p>

  <button id="open-jobs" class="primary">Open LinkedIn Jobs</button>

  <p id="api-msg" class="api-msg hidden"></p>

  <script src="popup.js"></script>
</body>
</html>
